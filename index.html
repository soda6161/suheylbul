<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tabu Ultra</title>
    <link rel="stylesheet" href="style-game.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
</head>
<body>
    <div id="app">

        <!-- LOGIN EKRANI -->
        <div id="screen-login" class="screen active">
            <input id="login-name-input" type="text" placeholder="İSMİNİ YAZ" maxlength="15">
            
            <div class="action-buttons">
                <div class="big-btn" onclick="NET.createRoom()">ODA OLUŞTUR</div>
                <div class="divider">veya</div>
                <input id="join-code-input" type="text" placeholder="ODA KODU (5 karakter)" maxlength="5" style="text-transform:uppercase">
                <div class="big-btn secondary" onclick="NET.manualJoin()">KOD İLE KATIL</div>
            </div>
        </div>

        <!-- LOBBY EKRANI -->
        <div id="screen-lobby" class="screen">
            <div id="room-info">
                ODA KODU: <span id="room-code-display" onclick="NET.copyRoomCode()">------</span>
            </div>

            <div class="teams-container">
                <!-- Kırmızı Takım -->
                <div class="team-panel red">
                    <div class="team-header">KIRMIZI TAKIM 🔥</div>
                    <div class="role-section">
                        <div class="role-label">ANLATICI</div>
                        <div id="slot-red-narrator" class="players-list"></div>
                    </div>
                    <div class="role-section">
                        <div class="role-label">TAHMİNCİLER</div>
                        <div id="slot-red-guesser" class="players-list"></div>
                    </div>
                </div>

                <!-- Mavi Takım -->
                <div class="team-panel blue">
                    <div class="team-header">MAVİ TAKIM ❄️</div>
                    <div class="role-section">
                        <div class="role-label">ANLATICI</div>
                        <div id="slot-blue-narrator" class="players-list"></div>
                    </div>
                    <div class="role-section">
                        <div class="role-label">TAHMİNCİLER</div>
                        <div id="slot-blue-guesser" class="players-list"></div>
                    </div>
                </div>
            </div>

            <div id="btn-start-game" onclick="ENGINE.startGame()">OYUNU BAŞLAT</div>
        </div>

        <!-- OYUN EKRANI -->
        <div id="screen-game" class="screen">
            <div id="game-stats">
                <div id="timer-display">00:00</div>
                <div id="score-display">K: 0 | M: 0</div>
            </div>

            <div id="word-card">
                <div id="word-main">BAŞLATILIYOR...</div>
                <div id="word-forbidden"></div>
            </div>

            <div id="narrator-controls" class="controls">
                <div class="game-btn tabu" onclick="ENGINE.reportTabu()">TABU</div>
                <div class="game-btn pass" onclick="ENGINE.passCard()">PAS</div>
                <div class="game-btn correct" onclick="ENGINE.reportCorrect()">DOĞRU</div>
            </div>

            <div id="listener-controls" class="controls">
                <input id="guess-input" type="text" placeholder="TAHMİNİNİ YAZ...">
                <div class="game-btn send" onclick="ENGINE.submitGuess()">GÖNDER</div>
            </div>
        </div>

        <div id="flash-overlay"></div>
    </div>

    <script src="network-core.js"></script>
    <script src="game-engine.js"></script>
</body>
</html>
